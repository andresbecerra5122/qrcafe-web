<div class="checkout">
  <h1 class="title">Checkout</h1>

  <div class="section">
    <h2>Resumen</h2>

    <div *ngFor="let item of cart.items" class="item">
      <span>{{ item.name }} × {{ item.qty }}</span>
      <span>{{ item.price * item.qty | currency:currency }}</span>
    </div>

    <div class="total">
        <span class="total-label">Total</span>
        <span class="total-amount">{{ subtotal() | currency:currency }}</span>
    </div>
  </div>

  <div class="section">
    <h2 class="section-title">Tipo de orden</h2>

    <div class="order-type-grid">
        <button
        type="button"
        class="order-type-card"
        [class.active]="orderType() === 'DINE_IN'"
        [disabled]="!canDineIn()"
        (click)="selectOrderType('DINE_IN')">

        <div class="radio-dot" [class.on]="orderType() === 'DINE_IN'"></div>

        <div class="card-text">
            <div class="card-title">Para mesa</div>
            <div class="card-subtitle">Te llevamos la comida a tu mesa</div>
        </div>

        <div class="chip">DINE IN</div>
        </button>

        <button
        type="button"
        class="order-type-card"
        [class.active]="orderType() === 'TAKEAWAY'"
        (click)="selectOrderType('TAKEAWAY')">

        <div class="radio-dot" [class.on]="orderType() === 'TAKEAWAY'"></div>

        <div class="card-text">
            <div class="card-title">Para llevar</div>
            <div class="card-subtitle">Retiras en mostrador</div>
        </div>

        <div class="chip">TAKEAWAY</div>
        </button>

        <button
        *ngIf="canDelivery()"
        type="button"
        class="order-type-card"
        [class.active]="orderType() === 'DELIVERY'"
        (click)="selectOrderType('DELIVERY')">

        <div class="radio-dot" [class.on]="orderType() === 'DELIVERY'"></div>

        <div class="card-text">
            <div class="card-title">Domicilio</div>
            <div class="card-subtitle">Enviamos a tu dirección</div>
        </div>

        <div class="chip">DOMICILIO</div>
        </button>
    </div>

    <!-- Solo informativo: mostrar mesa si aplica -->
    <div *ngIf="orderType() === 'DINE_IN' && cart.tableNumber" class="hint">
        Mesa detectada: <b>{{ cart.tableNumber }}</b>
    </div>
  </div>


  <div class="section">
    <input
      type="text"
      placeholder="Nombre (opcional)"
      (input)="customerName.set($any($event.target).value)" />

    <textarea
      placeholder="Notas (opcional)"
      (input)="notes.set($any($event.target).value)">
    </textarea>
  </div>

  <div class="section" *ngIf="orderType() === 'DELIVERY'">
    <input
      type="text"
      placeholder="Dirección de entrega"
      (input)="deliveryAddress.set($any($event.target).value)" />
    <input
      type="text"
      placeholder="Referencia (opcional)"
      (input)="deliveryReference.set($any($event.target).value)" />
    <input
      type="text"
      placeholder="Teléfono de contacto"
      (input)="deliveryPhone.set($any($event.target).value)" />

    <div class="section-title">Forma de pago</div>
    <div class="order-type-grid">
      <button
        *ngIf="canDeliveryCash()"
        type="button"
        class="order-type-card"
        [class.active]="deliveryPaymentMethod() === 'CASH'"
        (click)="selectDeliveryPaymentMethod('CASH')">
        <div class="radio-dot" [class.on]="deliveryPaymentMethod() === 'CASH'"></div>
        <div class="card-text">
          <div class="card-title">Efectivo</div>
          <div class="card-subtitle">Pago contraentrega</div>
        </div>
        <div class="chip">CASH</div>
      </button>

      <button
        *ngIf="canDeliveryCard()"
        type="button"
        class="order-type-card"
        [class.active]="deliveryPaymentMethod() === 'CARD'"
        (click)="selectDeliveryPaymentMethod('CARD')">
        <div class="radio-dot" [class.on]="deliveryPaymentMethod() === 'CARD'"></div>
        <div class="card-text">
          <div class="card-title">Tarjeta</div>
          <div class="card-subtitle">Pago contraentrega</div>
        </div>
        <div class="chip">CARD</div>
      </button>
    </div>
  </div>

  <div *ngIf="error()" class="error">
    {{ error() }}
  </div>

  <button
    class="btn"
    [disabled]="loading()"
    (click)="submit()">
    {{ loading() ? 'Creando orden...' : 'Confirmar orden' }}
  </button>
</div>
